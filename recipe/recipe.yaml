context:
  name: dm-control
  version: "1.0.31"
  mujoco_min_version: "3.3.3"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/d/dm_control/dm_control-${{ version }}.tar.gz
  sha256: b26050ce1810dc307c6a55851a1541ff8ca3cdbee4b3ff42c1f6020d2c2a8f07

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - mujoco ==${{ mujoco_min_version }}
  host:
    - python ${{ python_min }}.*
    - pip
    - mujoco ==${{ mujoco_min_version }}
    - pyparsing >=3.0.0
    - setuptools >=40.6.0
    - wheel
    - absl-py >=0.7.0
  run:
    - python >=${{ python_min }}
    - absl-py >=0.7.0
    - dm-env
    - dm-tree !=0.1.2
    - glfw
    - pyglfw
    - labmaze
    - lxml
    - mujoco >=${{ mujoco_min_version }}
    - numpy >=1.9.0
    - protobuf >=3.19.4
    - pyopengl >=3.1.4
    - pyparsing >=3.0.0
    - requests
    - setuptools !=50.0.0
    - scipy
    - tqdm

tests:
  - python:
      imports:
        - dm_control
      pip_check: true
      python_version: ${{ python_min }}.*
  - script:
      - pytest --pyargs dm_control -v -k "not (render or viewer or glfw or Camera or Depth or Scene or Overlay or Context or Pixels or visualize)"
    requirements:
      run:
        - python ${{ python_min }}.*
        - pip
        - pytest
        - mock
        - h5py
        - pillow
        - mujoco ==${{ mujoco_min_version }}


about:
  homepage: https://github.com/deepmind/dm_control
  summary: Continuous control environments and MuJoCo Python bindings.
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - traversaro
