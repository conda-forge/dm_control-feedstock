context:
  name: dm-control
  version: "1.0.28"
  mujoco_min_version: "3.2.7"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/d/dm_control/dm_control-${{ version }}.tar.gz
  sha256: 15e14c600885e9a0be2cd84577f57556a602bd5dbd26a0dcf348b10bea2dde65

build:
  number: 1
  noarch: python
  script: python -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - pip
    - setuptools
    - mujoco ==${{ mujoco_min_version }}
  host:
    - python ${{ python_min }}.*
    - pip
    - mujoco ==${{ mujoco_min_version }}
    - pyparsing >=3.0.0
    - setuptools >=40.6.0
    - wheel
    - absl-py >=0.7.0
  run:
    - python >=${{ python_min }}
    - absl-py >=0.7.0
    - dm-env
    - dm-tree !=0.1.2
    - glfw
    - pyglfw
    - labmaze
    - lxml
    - mujoco >=${{ mujoco_min_version }}
    - numpy >=1.9.0
    - protobuf >=3.19.4
    - pyopengl >=3.1.4
    - pyparsing >=3.0.0
    - requests
    - setuptools !=50.0.0
    - scipy
    - tqdm

tests:
  - python:
      imports:
        - dm_control
      pip_check: true
  - script:
      # All tests excluded (except for test_physics_error_message_in_debug_mode and ExportWithAssetsAsZipTest)
      # are excluded as they require a GL context.
      # test_physics_error_message_in_debug_mode and ExportWithAssetsAsZipTest are excluded due to
      # some Windows failures in loading test assets.
      - pytest --pyargs dm_control -v -k "not (viewer or render or glfw or Camera or cmu or rodent or termination or escape or maze or ant or ball or task or Depth or Scene or Overlay or Context or 39 or visualize or Pixels or test_physics_error_message_in_debug_mode or ExportWithAssetsAsZipTest or test_environment_is_deterministic40 or test_initial_state_is_randomized40 or test_observation_arrays_dont_share_memory40)"
    requirements:
      run:
        - python ${{ python_min }}.*
        - pip
        - pytest
        - mock
        - h5py
        - pillow
        - mujoco ==${{ mujoco_min_version }}
    python:
      python_version: ${{ python_min }}.*

about:
  homepage: https://github.com/deepmind/dm_control
  summary: Continuous control environments and MuJoCo Python bindings.
  license: Apache-2.0
  license_file: LICENSE

extra:
  recipe-maintainers:
    - traversaro
